# Para Hetzner (producción). Local: usar scripts/start-n8n.ps1 con Node.js.
# docker compose --env-file .env up -d

version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=sqlite
      # Permite acceso a process.env y módulos Node en Code nodes
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      # Secrets — accesibles en workflows via process.env.VARIABLE
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - NICHE_SLUG=${NICHE_SLUG:-ia-negocios}
      - CLOSER_TELEGRAM_CHAT_ID=${CLOSER_TELEGRAM_CHAT_ID}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    driver: local
